<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0f0f0f;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #maintenance-wrapper {
            text-align: center;
            padding: 20px;
        }

        .title {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .subtitle {
            font-size: 1.5rem;
            margin-top: 20px;
            color: #888888;
            max-width: 600px;
            line-height: 1.6;
        }

        .icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .title { font-size: 2.5rem; }
            .subtitle { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

    <div id="maintenance-wrapper">
        <div class="icon">🛠️</div>
        <div class="title">Under Maintenance</div>
        <div class="subtitle">
            The site is undergoing technical work. <br>
            We will be back online shortly!
        </div>
    </div>

</body>
</html>
